# 1D circularly polarized Alfven wave — primary MHD validation.
# Run on Metal (MPS):
#   python -m phrike alfven1d --config configs/alfven1d.yaml --backend torch --device mps
problem: alfven1d

grid:
  N: 256
  Lx: 1.0
  dealias: true
  precision: double      # ignored on MPS (forced to float32); use cpu for double

physics:
  gamma: 1.6666666666666667   # 5/3
  mhd:
    enabled: true
    resistivity: 0.0          # eta (0 = ideal)
    viscosity: 0.0            # nu  (0 = ideal)
    divergence_clean: projection
    project_each_substage: true

integration:
  t0: 0.0
  t_end: 1.0                  # one wave period (c_A = B0/sqrt(rho0) = 1, Lx=1)
  cfl: 0.4
  scheme: rk4
  output_interval: 0.1
  checkpoint_interval: 0.0
  spectral_filter:
    enabled: true
    p: 8
    alpha: 36.0

initial_conditions:
  rho0: 1.0
  p0: 0.1
  B0: 1.0          # mean field along x (propagation direction)
  b1: 0.1          # transverse fluctuation amplitude
  m: 1             # wavenumber index (k = 2*pi*m/Lx)
  direction: 1     # +1 = +x propagation

io:
  outdir: outputs/alfven1d

monitoring:
  enabled: true
  step_interval: 50
  include_conservation: true
  include_timestep: true
  include_time: true
